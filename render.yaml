services:
  - type: web
    name: allievo-backend
    env: node
    buildCommand: "cd backend && npm ci"
    startCommand: "cd backend && node src/server.js"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: DEMO_MODE
        value: "true"
